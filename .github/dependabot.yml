version: 2
updates:
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      patch:
        update-types: [patch]
      minor:
        update-types: [minor]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
