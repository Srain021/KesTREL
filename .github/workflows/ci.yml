name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: pip install "uv>=0.5"

      - name: Install project with dev extras
        run: uv sync --frozen --all-extras

      - name: Ruff lint
        run: uv run --no-sync ruff check src tests

      - name: Ruff format check
        run: uv run --no-sync ruff format --check src tests

      - name: Mypy (core + domain)
        run: uv run --no-sync mypy --strict src/kestrel_mcp/core src/kestrel_mcp/domain

  test:
    needs: lint
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python-version: ["3.10", "3.11", "3.12"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: pip install "uv>=0.5"

      - name: Install project with dev extras
        run: uv sync --frozen --all-extras

      - name: Unit + integration tests
        run: uv run --no-sync pytest tests/ -q --maxfail=3

      - name: Full verify (end-to-end)
        run: uv run --no-sync python scripts/full_verify.py
