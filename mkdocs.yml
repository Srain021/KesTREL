site_name: Kestrel MCP
site_description: Scope-gated offensive-security MCP server for authorized teams.
repo_url: https://github.com/Srain021/KesTREL
theme:
  name: material
  features:
    - navigation.sections
    - navigation.top
    - content.code.copy
nav:
  - Home: index.md
  - Quickstart: quickstart.md
  - Chinese Manual: user-manual.zh-CN.md
  - Internal Firepower: internal-firepower.md
  - Releasing: releasing.md
  - Release Checklist: RELEASE_CHECKLIST.md
  - RFCs: rfcs/index.md
  - Reference: reference.md
markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - pymdownx.superfences
  - pymdownx.highlight
