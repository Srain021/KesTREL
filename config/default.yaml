server:
  name: "kestrel-mcp"
  version: "1.0.0"

security:
  authorized_scope: []
  require_ack: true
  dry_run: false
  audit_log: "~/.kestrel/audit.log"
  dangerous_ops_require_scope: true

execution:
  timeout_sec: 300
  max_output_bytes: 5242880
  working_dir: "~/.kestrel/runs"

logging:
  level: "INFO"
  format: "json"
  dir: "~/.kestrel/logs"

tools:
  nuclei:
    enabled: true
    binary: null
    templates_dir: null
    default_rate_limit: 150

  shodan:
    enabled: true
    api_key_env: "SHODAN_API_KEY"
    default_limit: 100

  subfinder:
    enabled: false
    binary: null

  httpx:
    enabled: false
    binary: null

  nmap:
    enabled: false
    binary: null

  ffuf:
    enabled: false
    binary: null
    wordlists_dir: "."

  impacket:
    enabled: false

  bloodhound:
    enabled: false
    api_url: "http://127.0.0.1:8080"
    api_key: null

  caido:
    enabled: false
    binary: null

  evilginx:
    enabled: false
    binary: null
    phishlets_dir: null
    config_dir: "~/.evilginx"
    require_scope: true

  sliver:
    enabled: false
    server_binary: null
    client_binary: null
    operator_config: null
    require_scope: true

  havoc:
    enabled: false
    binary: null
    source_dir: null
    profile: null
    require_scope: true

  ligolo:
    enabled: false
    binary: null
    proxy_binary: null
