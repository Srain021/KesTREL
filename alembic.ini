[alembic]
script_location = src/kestrel_mcp/domain/migrations
prepend_sys_path = .
# timezone = UTC  # disabled on Windows without tzdata; timestamps default to UTC anyway via entities
truncate_slug_length = 40
version_path_separator = os
version_locations = %(here)s/src/kestrel_mcp/domain/migrations/versions
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(rev)s_%%(slug)s

# Default URL; overridden at runtime by env.py for per-engagement DBs.
sqlalchemy.url = sqlite:///./kestrel-dev.db

[post_write_hooks]
# Post-write formatting disabled for now; enable once ruff is guaranteed to be a console_scripts entrypoint.
hooks =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
